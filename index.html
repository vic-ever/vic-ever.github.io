<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiyueChen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        /* 光标跟随光晕 */
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.15) 0%, rgba(200, 50, 255, 0.08) 30%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        /* 炫彩粒子背景 */
        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 主内容 */
        .main {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        /* 名字 - 炫彩渐变 */
        .name {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(
                90deg,
                #fff 0%,
                #a78bfa 15%,
                #818cf8 30%,
                #6ee7b7 45%,
                #38bdf8 60%,
                #f472b6 75%,
                #fb923c 90%,
                #fff 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 6s linear infinite;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .name.visible {
            animation: gradientFlow 6s linear infinite, fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* tagline 打字机效果 */
        .tagline {
            margin-top: 1.5rem;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            height: 1.5em;
            opacity: 0;
        }

        .tagline.visible {
            animation: fadeIn 1s ease 0.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tagline .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: rgba(255, 255, 255, 0.5);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 底部社交图标 */
        .socials {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 1.6s forwards;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .socials a:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.3);
        }

        .socials a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 底部细线装饰 */
        .line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(120, 80, 255, 0.3) 50%, transparent 100%);
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="glow" id="glow"></div>

    <div class="main">
        <h1 class="name" id="name">SiyueChen</h1>
        <div class="tagline" id="tagline"></div>
    </div>

    <div class="socials">
        <a href="mailto:202430740144@mail.scut.edu.cn" title="Email">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

    <div class="line"></div>

    <script>
        // ====== 光标跟随光晕 ======
        const glow = document.getElementById('glow');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let glowX = mouseX;
        let glowY = mouseY;

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateGlow() {
            glowX += (mouseX - glowX) * 0.08;
            glowY += (mouseY - glowY) * 0.08;
            glow.style.left = glowX + 'px';
            glow.style.top = glowY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        // ====== 炫彩粒子 ======
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const particles = [];
        const PARTICLE_COUNT = 80;
        const colors = [
            'rgba(167, 139, 250,',  // purple
            'rgba(129, 140, 248,',  // indigo
            'rgba(110, 231, 183,',  // green
            'rgba(56, 189, 248,',   // blue
            'rgba(244, 114, 182,',  // pink
            'rgba(251, 146, 60,',   // orange
        ];

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                size: Math.random() * 2 + 0.5,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: Math.random() * 0.5 + 0.1,
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                // 靠近鼠标的粒子变亮
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const boost = Math.max(0, 1 - dist / 300) * 0.6;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color + (p.alpha + boost) + ')';
                ctx.fill();

                // 粒子间连线
                particles.forEach(p2 => {
                    const d = Math.sqrt((p.x - p2.x) ** 2 + (p.y - p2.y) ** 2);
                    if (d < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = p.color + (0.06 * (1 - d / 120) + boost * 0.1) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });

                // 移动
                p.x += p.vx;
                p.y += p.vy;

                // 边界反弹
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });

            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // ====== 入场动画 ======
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('name').classList.add('visible');
            }, 200);

            setTimeout(() => {
                const tagline = document.getElementById('tagline');
                tagline.classList.add('visible');
                typeWriter(tagline, 'Developer  /  Creator  /  Explorer');
            }, 1200);
        });

        // ====== 打字机效果 ======
        function typeWriter(el, text) {
            let i = 0;
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            el.appendChild(cursor);

            function type() {
                if (i < text.length) {
                    el.insertBefore(document.createTextNode(text[i]), cursor);
                    i++;
                    setTimeout(type, 60 + Math.random() * 40);
                } else {
                    // 打完后光标闪几秒然后消失
                    setTimeout(() => {
                        cursor.style.animation = 'fadeOut 1s forwards';
                        cursor.style.opacity = '0';
                    }, 3000);
                }
            }
            type();
        }
    </script>
</body>
</html>
