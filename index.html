<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiyueChen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08070d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(120, 70, 200, 0.12) 0%, rgba(100, 60, 180, 0.06) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        canvas#circuit {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        .ambient-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 15%;
            background: rgba(90, 50, 160, 0.06);
            animation: drift1 20s ease-in-out infinite;
        }
        .ambient-2 {
            width: 350px;
            height: 350px;
            bottom: 15%;
            right: 10%;
            background: rgba(120, 60, 180, 0.05);
            animation: drift2 25s ease-in-out infinite;
        }
        .ambient-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 60%;
            background: rgba(100, 50, 170, 0.04);
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(60px, -40px); }
            66% { transform: translate(-30px, 50px); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-50px, 30px); }
            66% { transform: translate(40px, -60px); }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-70px, -40px); }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background:
                radial-gradient(ellipse at center, transparent 35%, #08070d 80%),
                linear-gradient(to bottom, #08070d 0%, transparent 10%, transparent 90%, #08070d 100%);
        }

        .main {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-bottom: 8vh;
            user-select: none;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(140, 100, 210, 0.2);
            margin-bottom: 2rem;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
            box-shadow: 0 0 40px rgba(120, 70, 200, 0.1);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            animation: avatarIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .avatar:hover {
            border-color: rgba(140, 100, 210, 0.5);
            box-shadow: 0 0 50px rgba(120, 70, 200, 0.2);
        }

        @keyframes avatarIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(60, 40, 100, 0.5), rgba(40, 30, 70, 0.5));
            font-size: 2.2rem;
            font-weight: 600;
            color: rgba(170, 140, 220, 0.6);
            letter-spacing: -0.02em;
        }

        .name {
            font-size: clamp(3rem, 10vw, 7.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            opacity: 0;
            transform: translateY(20px);
            background: linear-gradient(90deg, rgba(215,200,245,0.95), rgba(160,120,230,0.9), rgba(240,235,255,0.95), rgba(140,100,220,0.9), rgba(215,200,245,0.95));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards,
                       nameShift 8s ease-in-out 1.6s infinite,
                       nameGlow 4s ease-in-out 1.6s infinite;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes nameShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes nameGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(130, 80, 210, 0.15))
                        drop-shadow(0 0 50px rgba(110, 60, 190, 0.06));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(140, 90, 220, 0.3))
                        drop-shadow(0 0 70px rgba(120, 70, 200, 0.12));
            }
        }

        .tagline {
            margin-top: 1.2rem;
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 300;
            color: rgba(160, 140, 190, 0.45);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            min-height: 1.5em;
            opacity: 0;
            animation: fadeIn 1s ease 1.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tagline .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: rgba(160, 140, 190, 0.5);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .socials {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(160, 140, 190, 0.1);
            color: rgba(160, 140, 190, 0.3);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .socials a:hover {
            border-color: rgba(160, 140, 190, 0.35);
            color: rgba(215, 200, 240, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(120, 70, 200, 0.15);
        }

        .socials a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(120, 70, 200, 0.2) 50%, transparent 100%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <script>
        // ====== 光标跟随 ======
        var glow = document.getElementById('glow');
        var mouseX = window.innerWidth / 2;
        var mouseY = window.innerHeight / 2;
        var glowX = mouseX;
        var glowY = mouseY;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateGlow() {
            glowX += (mouseX - glowX) * 0.06;
            glowY += (mouseY - glowY) * 0.06;
            glow.style.left = glowX + 'px';
            glow.style.top = glowY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        // ====== 电路板效果 ======
        var canvas = document.getElementById('circuit');
        var ctx = canvas.getContext('2d');
        var W, H;
        var circuits = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            generateCircuits();
        }
        resize();
        window.addEventListener('resize', resize);

        function generateCircuits() {
            circuits = [];
            var count = Math.floor((W * H) / 10000);

            for (var i = 0; i < count; i++) {
                var path = [];
                var x = Math.random() * W;
                var y = Math.random() * H;
                path.push({ x: x, y: y });

                var segments = 3 + Math.floor(Math.random() * 6);
                var dir = Math.random() < 0.5 ? 'h' : 'v';

                for (var s = 0; s < segments; s++) {
                    var len = 30 + Math.random() * 120;
                    if (dir === 'h') {
                        x += (Math.random() < 0.5 ? -1 : 1) * len;
                    } else {
                        y += (Math.random() < 0.5 ? -1 : 1) * len;
                    }
                    path.push({ x: x, y: y });
                    dir = dir === 'h' ? 'v' : 'h';
                }

                circuits.push({
                    path: path,
                    pulseOffset: Math.random() * 1000,
                    pulseSpeed: 0.08 + Math.random() * 0.12,
                    baseAlpha: 0.05 + Math.random() * 0.06,
                    totalLen: 0
                });
            }

            // 预计算路径长度和每段长度
            for (var ci = 0; ci < circuits.length; ci++) {
                var p = circuits[ci].path;
                var len = 0;
                var sLens = [];
                for (var j = 1; j < p.length; j++) {
                    var sLen = Math.abs(p[j].x - p[j - 1].x) + Math.abs(p[j].y - p[j - 1].y);
                    sLens.push(sLen);
                    len += sLen;
                }
                circuits[ci].totalLen = len;
                circuits[ci].segLens = sLens;
            }
        }

        // 计算路径上某个 t(0~1) 对应的累计距离
        function getPointOnPath(path, totalLen, t) {
            var target = t * totalLen;
            for (var i = 1; i < path.length; i++) {
                var segLen = Math.abs(path[i].x - path[i - 1].x) + Math.abs(path[i].y - path[i - 1].y);
                if (target <= segLen) {
                    var ratio = segLen > 0 ? target / segLen : 0;
                    return {
                        x: path[i - 1].x + (path[i].x - path[i - 1].x) * ratio,
                        y: path[i - 1].y + (path[i].y - path[i - 1].y) * ratio
                    };
                }
                target -= segLen;
            }
            return path[path.length - 1];
        }

        // 获取路径上 t 值对应的段索引和段内比例
        function getSegmentAt(path, segLens, totalLen, t) {
            var target = t * totalLen;
            for (var i = 0; i < segLens.length; i++) {
                if (target <= segLens[i]) {
                    var ratio = segLens[i] > 0 ? target / segLens[i] : 0;
                    return { seg: i, ratio: ratio };
                }
                target -= segLens[i];
            }
            return { seg: segLens.length - 1, ratio: 1 };
        }

        // 在两个 t 值间裁剪路径并描边（发光线段效果）
        function strokeGlowSegment(path, segLens, totalLen, tStart, tEnd, alpha, width, proximity) {
            if (tStart >= tEnd) return;

            var startInfo = getSegmentAt(path, segLens, totalLen, tStart);
            var endInfo = getSegmentAt(path, segLens, totalLen, tEnd);

            ctx.beginPath();

            // 起点
            var sx = path[startInfo.seg].x + (path[startInfo.seg + 1].x - path[startInfo.seg].x) * startInfo.ratio;
            var sy = path[startInfo.seg].y + (path[startInfo.seg + 1].y - path[startInfo.seg].y) * startInfo.ratio;
            ctx.moveTo(sx, sy);

            // 中间完整段的端点
            for (var i = startInfo.seg + 1; i <= endInfo.seg; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }

            // 终点
            var ex = path[endInfo.seg].x + (path[endInfo.seg + 1].x - path[endInfo.seg].x) * endInfo.ratio;
            var ey = path[endInfo.seg].y + (path[endInfo.seg + 1].y - path[endInfo.seg].y) * endInfo.ratio;
            ctx.lineTo(ex, ey);

            ctx.strokeStyle = 'rgba(160, 120, 255, ' + alpha + ')';
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 头部光点
            ctx.beginPath();
            ctx.arc(ex, ey, 2.5 + proximity * 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180, 150, 255, ' + (alpha * 0.8) + ')';
            ctx.fill();

            // 头部光晕
            ctx.beginPath();
            ctx.arc(ex, ey, 8 + proximity * 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(140, 100, 240, ' + (alpha * 0.1) + ')';
            ctx.fill();
        }

        var GLOW_LENGTH = 0.2;  // 发光段占路径总长比例

        function drawCircuit(time) {
            ctx.clearRect(0, 0, W, H);

            for (var ci = 0; ci < circuits.length; ci++) {
                var c = circuits[ci];
                var path = c.path;

                var mid = getPointOnPath(path, c.totalLen, 0.5);
                var dx = mid.x - mouseX;
                var dy = mid.y - mouseY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var proximity = Math.max(0, 1 - dist / 350);

                // 基础暗线
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                for (var i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i].x, path[i].y);
                }
                var lineAlpha = c.baseAlpha + proximity * 0.18;
                ctx.strokeStyle = 'rgba(110, 70, 190, ' + lineAlpha + ')';
                ctx.lineWidth = 0.6 + proximity * 0.6;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 节点
                for (var j = 0; j < path.length; j++) {
                    var pt = path[j];
                    var d = Math.sqrt((pt.x - mouseX) * (pt.x - mouseX) + (pt.y - mouseY) * (pt.y - mouseY));
                    var p = Math.max(0, 1 - d / 300);
                    if (c.baseAlpha + p > 0.06) {
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, 1.5 + p * 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(150, 110, 230, ' + (c.baseAlpha * 2.5 + p * 0.6) + ')';
                        ctx.fill();
                    }
                }

                // 发光线段：路径本身的一段变亮
                var headT = ((time * c.pulseSpeed * 0.001) + c.pulseOffset) % 1;
                var tailT = headT - GLOW_LENGTH;

                var glowAlpha = 0.25 + proximity * 0.45;
                var glowWidth = 1.5 + proximity * 1.5;

                if (tailT >= 0) {
                    strokeGlowSegment(path, c.segLens, c.totalLen, tailT, headT, glowAlpha, glowWidth, proximity);
                } else {
                    // 跨越起点时分两段画
                    strokeGlowSegment(path, c.segLens, c.totalLen, 0, headT, glowAlpha, glowWidth, proximity);
                    strokeGlowSegment(path, c.segLens, c.totalLen, 1 + tailT, 1, glowAlpha, glowWidth, proximity);
                }
            }

            requestAnimationFrame(drawCircuit);
        }
        requestAnimationFrame(drawCircuit);

        // ====== 打字机效果 ======
        try {
            var taglineEl = document.getElementById('tagline');
            var taglineText = taglineEl.textContent;
            taglineEl.textContent = '';

            setTimeout(function() {
                var i = 0;
                var cursor = document.createElement('span');
                cursor.className = 'cursor';
                taglineEl.appendChild(cursor);

                function type() {
                    if (i < taglineText.length) {
                        taglineEl.insertBefore(document.createTextNode(taglineText[i]), cursor);
                        i++;
                        setTimeout(type, 50 + Math.random() * 35);
                    } else {
                        setTimeout(function() {
                            cursor.style.transition = 'opacity 1s';
                            cursor.style.opacity = '0';
                        }, 3000);
                    }
                }
                type();
            }, 1400);
        } catch(e) {}
    </script>
</body>
