<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiyueChen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #09080e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(145, 125, 195, 0.12) 0%, rgba(130, 110, 180, 0.06) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        canvas#circuit {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        .ambient-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 15%;
            background: rgba(110, 90, 160, 0.06);
            animation: drift1 20s ease-in-out infinite;
        }
        .ambient-2 {
            width: 350px;
            height: 350px;
            bottom: 15%;
            right: 10%;
            background: rgba(120, 100, 170, 0.05);
            animation: drift2 25s ease-in-out infinite;
        }
        .ambient-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 60%;
            background: rgba(115, 95, 165, 0.04);
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(60px, -40px); }
            66% { transform: translate(-30px, 50px); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-50px, 30px); }
            66% { transform: translate(40px, -60px); }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-70px, -40px); }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background:
                radial-gradient(ellipse at center, transparent 35%, #09080e 80%),
                linear-gradient(to bottom, #09080e 0%, transparent 10%, transparent 90%, #09080e 100%);
        }

        .main {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-bottom: 24vh;
            user-select: none;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(165, 148, 210, 0.2);
            margin-bottom: 1rem;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
            box-shadow: 0 0 40px rgba(145, 125, 195, 0.1);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            animation: avatarIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .avatar:hover {
            border-color: rgba(165, 148, 210, 0.45);
            box-shadow: 0 0 50px rgba(145, 125, 195, 0.18);
        }

        @keyframes avatarIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: clamp(3rem, 10vw, 7.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            opacity: 0;
            transform: translateY(20px);
            background: linear-gradient(90deg, rgba(230,225,248,1), rgba(175,160,225,0.95), rgba(248,245,255,1), rgba(168,152,220,0.95), rgba(230,225,248,1));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards,
                       nameShift 8s ease-in-out 1.6s infinite,
                       nameGlow 4s ease-in-out 1.6s infinite;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes nameShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes nameGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(150, 130, 200, 0.15))
                        drop-shadow(0 0 50px rgba(135, 115, 185, 0.06));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(155, 135, 205, 0.28))
                        drop-shadow(0 0 70px rgba(140, 120, 190, 0.12));
            }
        }

        .tagline {
            margin-top: 1.2rem;
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 300;
            color: rgba(170, 155, 210, 0.55);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            min-height: 1.5em;
            opacity: 0;
            animation: fadeIn 1s ease 1.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tagline .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: rgba(170, 155, 210, 0.5);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .socials {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(170, 155, 210, 0.1);
            color: rgba(170, 155, 210, 0.3);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .socials a:hover {
            border-color: rgba(170, 155, 210, 0.35);
            color: rgba(230, 225, 248, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(145, 125, 195, 0.15);
        }

        .socials a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(145, 125, 195, 0.18) 50%, transparent 100%);
            z-index: 10;
        }
    </style>
</head>
<body>

        <div class="tagline" id="tagline">South China University of Technology</div>

    <div class="line"></div>

    <script>
        var glow = document.getElementById('glow');
        var mouseX = window.innerWidth / 2;
        var mouseY = window.innerHeight / 2;
        var glowX = mouseX;
        var glowY = mouseY;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateGlow() {
            glowX += (mouseX - glowX) * 0.06;
            glowY += (mouseY - glowY) * 0.06;
            glow.style.left = glowX + 'px';
            glow.style.top = glowY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        var canvas = document.getElementById('circuit');
        var ctx = canvas.getContext('2d');
        var W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // ====== Hello Kitty 蝴蝶结：三个圆（左翼、右翼、中心结）======
        // 三个圆的定义
        var bowCircles = [];
        var bowPaths = []; // 每个圆的采样点数组

        function generateBow() {
            var cx = W / 2;
            var cy = H / 2 - H * 0.05;
            var s = Math.min(W, H) * 0.28;

            // 左翼圆 - 大圆，向左偏移
            // 右翼圆 - 大圆，向右偏移
            // 中心结 - 小圆，居中
            bowCircles = [
                { x: cx - s * 0.72, y: cy, r: s * 0.62 },  // 左翼
                { x: cx + s * 0.72, y: cy, r: s * 0.62 },  // 右翼
                { x: cx, y: cy, r: s * 0.22 }               // 中心结
            ];

            // 对每个圆采样成点
            bowPaths = [];
            for (var c = 0; c < bowCircles.length; c++) {
                var circle = bowCircles[c];
                var n = c < 2 ? 80 : 40; // 大圆更多采样点
                var pts = [];
                for (var i = 0; i <= n; i++) {
                    var a = (i / n) * Math.PI * 2;
                    pts.push({
                        x: circle.x + Math.cos(a) * circle.r,
                        y: circle.y + Math.sin(a) * circle.r
                    });
                }
                bowPaths.push(pts);
            }
        }

        generateBow();
        window.addEventListener('resize', function() {
            resize();
            generateBow();
        });

        function drawFrame(time) {
            ctx.clearRect(0, 0, W, H);

            // 鼠标距中心距离 → 亮度增强
            var bcx = W / 2, bcy = H / 2 - H * 0.05;
            var bdist = Math.sqrt((mouseX - bcx) * (mouseX - bcx) + (mouseY - bcy) * (mouseY - bcy));
            var bprox = Math.max(0, 1 - bdist / (Math.min(W, H) * 0.45));

            // 画每个圆
            for (var c = 0; c < bowCircles.length; c++) {
                var circle = bowCircles[c];
                var pts = bowPaths[c];

                // 基础轮廓
                ctx.beginPath();
                ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(150, 130, 200, ' + (0.06 + bprox * 0.04) + ')';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 淡填充
                ctx.beginPath();
                ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(140, 120, 190, ' + (0.015 + bprox * 0.01) + ')';
                ctx.fill();

                // 流动光段 - 每个圆2条光
                for (var g = 0; g < 2; g++) {
                    var speed = c < 2 ? 0.00008 : 0.00012;
                    var dir = g === 0 ? 1 : -1;
                    var offset = g * 0.5;
                    var headAngle = (dir * time * speed + offset + c * 2.1) % 1;
                    if (headAngle < 0) headAngle += 1;

                    var trailLen = 0.15;
                    var steps = 30;

                    // 绘制光尾
                    ctx.lineCap = 'round';
                    for (var st = 0; st < steps; st++) {
                        var ratio = st / steps;
                        var sampleT = headAngle - dir * ratio * trailLen;
                        sampleT = ((sampleT % 1) + 1) % 1;

                        var angle = sampleT * Math.PI * 2;
                        var px = circle.x + Math.cos(angle) * circle.r;
                        var py = circle.y + Math.sin(angle) * circle.r;

                        var fade = 1 - ratio;
                        fade = fade * fade;
                        var alpha = fade * (0.25 + bprox * 0.18);
                        var size = 1.5 + fade * 3;

                        ctx.beginPath();
                        ctx.arc(px, py, size, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(175, 158, 235, ' + alpha + ')';
                        ctx.fill();
                    }

                    // 头部亮点
                    var headA = headAngle * Math.PI * 2;
                    var hx = circle.x + Math.cos(headA) * circle.r;
                    var hy = circle.y + Math.sin(headA) * circle.r;

                    ctx.beginPath();
                    ctx.arc(hx, hy, 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(195, 178, 245, ' + (0.35 + bprox * 0.2) + ')';
                    ctx.fill();

                    // 头部光晕
                    ctx.beginPath();
                    ctx.arc(hx, hy, 12, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(160, 140, 220, 0.04)';
                    ctx.fill();
                }
            }

            requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);

        try {
            var taglineEl = document.getElementById('tagline');
            var taglineText = taglineEl.textContent;
            taglineEl.textContent = '';

            setTimeout(function() {
                var i = 0;
                var cursor = document.createElement('span');
                cursor.className = 'cursor';
                taglineEl.appendChild(cursor);

                function type() {
                    if (i < taglineText.length) {
                        taglineEl.insertBefore(document.createTextNode(taglineText[i]), cursor);
                        i++;
                        setTimeout(type, 50 + Math.random() * 35);
                    } else {
                        setTimeout(function() {
                            cursor.style.transition = 'opacity 1s';
                            cursor.style.opacity = '0';
                        }, 3000);
                    }
                }
                type();
            }, 1400);
        } catch(e) {}
    </script>
