<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiyueChen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #09080e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(145, 125, 195, 0.12) 0%, rgba(130, 110, 180, 0.06) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        canvas#circuit {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        .ambient-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 15%;
            background: rgba(110, 90, 160, 0.06);
            animation: drift1 20s ease-in-out infinite;
        }
        .ambient-2 {
            width: 350px;
            height: 350px;
            bottom: 15%;
            right: 10%;
            background: rgba(120, 100, 170, 0.05);
            animation: drift2 25s ease-in-out infinite;
        }
        .ambient-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 60%;
            background: rgba(115, 95, 165, 0.04);
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(60px, -40px); }
            66% { transform: translate(-30px, 50px); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-50px, 30px); }
            66% { transform: translate(40px, -60px); }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-70px, -40px); }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background:
                radial-gradient(ellipse at center, transparent 35%, #09080e 80%),
                linear-gradient(to bottom, #09080e 0%, transparent 10%, transparent 90%, #09080e 100%);
        }

        .main {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-bottom: 24vh;
            user-select: none;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(165, 148, 210, 0.2);
            margin-bottom: 1rem;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
            box-shadow: 0 0 40px rgba(145, 125, 195, 0.1);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            animation: avatarIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .avatar:hover {
            border-color: rgba(165, 148, 210, 0.45);
            box-shadow: 0 0 50px rgba(145, 125, 195, 0.18);
        }

        @keyframes avatarIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: clamp(3rem, 10vw, 7.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            opacity: 0;
            transform: translateY(20px);
            background: linear-gradient(90deg, rgba(230,225,248,1), rgba(175,160,225,0.95), rgba(248,245,255,1), rgba(168,152,220,0.95), rgba(230,225,248,1));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards,
                       nameShift 8s ease-in-out 1.6s infinite,
                       nameGlow 4s ease-in-out 1.6s infinite;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes nameShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes nameGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(150, 130, 200, 0.15))
                        drop-shadow(0 0 50px rgba(135, 115, 185, 0.06));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(155, 135, 205, 0.28))
                        drop-shadow(0 0 70px rgba(140, 120, 190, 0.12));
            }
        }

        .tagline {
            margin-top: 1.2rem;
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 300;
            color: rgba(170, 155, 210, 0.55);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            min-height: 1.5em;
            opacity: 0;
            animation: fadeIn 1s ease 1.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .tagline .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: rgba(170, 155, 210, 0.5);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .socials {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(170, 155, 210, 0.1);
            color: rgba(170, 155, 210, 0.3);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .socials a:hover {
            border-color: rgba(170, 155, 210, 0.35);
            color: rgba(230, 225, 248, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(145, 125, 195, 0.15);
        }

        .socials a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(145, 125, 195, 0.18) 50%, transparent 100%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <script>
        var glow = document.getElementById('glow');
        var mouseX = window.innerWidth / 2;
        var mouseY = window.innerHeight / 2;
        var glowX = mouseX;
        var glowY = mouseY;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateGlow() {
            glowX += (mouseX - glowX) * 0.06;
            glowY += (mouseY - glowY) * 0.06;
            glow.style.left = glowX + 'px';
            glow.style.top = glowY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        var canvas = document.getElementById('circuit');
        var ctx = canvas.getContext('2d');
        var W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // ====== Hello Kitty 蝴蝶结：倾斜椭圆 + 流动弧光 ======
        var bowParts = [];

        function generateBow() {
            var cx = W / 2;
            var cy = H / 2 - H * 0.05;
            var unit = Math.min(W, H) * 0.22;
            var tilt = -0.3; // 整体倾斜角度 (~17度)

            // 先算未倾斜的位置，再统一旋转
            var rawParts = [
                { ox: -unit * 0.95, oy: 0, rx: unit * 1.2, ry: unit * 0.85, localRot: -0.18, isKnot: false },
                { ox: unit * 0.95, oy: 0, rx: unit * 1.2, ry: unit * 0.85, localRot: 0.18, isKnot: false },
                { ox: 0, oy: 0, rx: unit * 0.35, ry: unit * 0.42, localRot: 0, isKnot: true }
            ];

            bowParts = [];
            for (var i = 0; i < rawParts.length; i++) {
                var r = rawParts[i];
                // 绕中心旋转位置
                var rx2 = r.ox * Math.cos(tilt) - r.oy * Math.sin(tilt);
                var ry2 = r.ox * Math.sin(tilt) + r.oy * Math.cos(tilt);
                bowParts.push({
                    cx: cx + rx2,
                    cy: cy + ry2,
                    rx: r.rx,
                    ry: r.ry,
                    rot: r.localRot + tilt,
                    isKnot: r.isKnot
                });
            }
        }

        generateBow();
        window.addEventListener('resize', function() {
            resize();
            generateBow();
        });

        function ellipsePoint(part, angle) {
            var ux = Math.cos(angle) * part.rx;
            var uy = Math.sin(angle) * part.ry;
            return {
                x: part.cx + ux * Math.cos(part.rot) - uy * Math.sin(part.rot),
                y: part.cy + ux * Math.sin(part.rot) + uy * Math.cos(part.rot)
            };
        }

        function drawFrame(time) {
            ctx.clearRect(0, 0, W, H);

            var bcx = W / 2, bcy = H / 2 - H * 0.05;
            var bdist = Math.sqrt((mouseX - bcx) * (mouseX - bcx) + (mouseY - bcy) * (mouseY - bcy));
            var bprox = Math.max(0, 1 - bdist / (Math.min(W, H) * 0.5));

            ctx.lineCap = 'round';

            for (var p = 0; p < bowParts.length; p++) {
                var part = bowParts[p];

                // 基础轮廓描边
                ctx.beginPath();
                ctx.ellipse(part.cx, part.cy, part.rx, part.ry, part.rot, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(150, 130, 200, ' + (0.07 + bprox * 0.04) + ')';
                ctx.lineWidth = part.isKnot ? 1.2 : 1.8;
                ctx.stroke();

                // 极淡填充
                ctx.beginPath();
                ctx.ellipse(part.cx, part.cy, part.rx, part.ry, part.rot, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(140, 120, 190, ' + (0.015 + bprox * 0.008) + ')';
                ctx.fill();

                // 流动弧光
                var numGlows = part.isKnot ? 1 : 2;
                for (var g = 0; g < numGlows; g++) {
                    var speed = part.isKnot ? 0.0003 : 0.00018;
                    var baseAngle = time * speed + g * Math.PI + p * 2.2;

                    // 光尾 (长弧，淡)
                    ctx.beginPath();
                    ctx.ellipse(part.cx, part.cy, part.rx, part.ry, part.rot, baseAngle - Math.PI * 0.45, baseAngle);
                    ctx.strokeStyle = 'rgba(165, 148, 225, ' + (0.08 + bprox * 0.06) + ')';
                    ctx.lineWidth = part.isKnot ? 2 : 2.5;
                    ctx.stroke();

                    // 光体 (中弧，亮)
                    ctx.beginPath();
                    ctx.ellipse(part.cx, part.cy, part.rx, part.ry, part.rot, baseAngle - Math.PI * 0.18, baseAngle);
                    ctx.strokeStyle = 'rgba(180, 163, 238, ' + (0.18 + bprox * 0.12) + ')';
                    ctx.lineWidth = part.isKnot ? 2.5 : 3;
                    ctx.stroke();

                    // 光头 (短弧，最亮)
                    ctx.beginPath();
                    ctx.ellipse(part.cx, part.cy, part.rx, part.ry, part.rot, baseAngle - Math.PI * 0.05, baseAngle);
                    ctx.strokeStyle = 'rgba(200, 185, 248, ' + (0.3 + bprox * 0.2) + ')';
                    ctx.lineWidth = part.isKnot ? 3 : 3.5;
                    ctx.stroke();

                    // 头部亮点 + 光晕
                    var head = ellipsePoint(part, baseAngle);

                    ctx.beginPath();
                    ctx.arc(head.x, head.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(210, 195, 252, ' + (0.4 + bprox * 0.2) + ')';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(head.x, head.y, 14, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(160, 140, 220, 0.035)';
                    ctx.fill();
                }
            }

            requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);

        try {
            var taglineEl = document.getElementById('tagline');
            var taglineText = taglineEl.textContent;
            taglineEl.textContent = '';

            setTimeout(function() {
                var i = 0;
                var cursor = document.createElement('span');
                cursor.className = 'cursor';
                taglineEl.appendChild(cursor);

                function type() {
                    if (i < taglineText.length) {
                        taglineEl.insertBefore(document.createTextNode(taglineText[i]), cursor);
                        i++;
                        setTimeout(type, 50 + Math.random() * 35);
                    } else {
                        setTimeout(function() {
                            cursor.style.transition = 'opacity 1s';
                            cursor.style.opacity = '0';
                        }, 3000);
                    }
                }
                type();
            }, 1400);
        } catch(e) {}
    </script>
